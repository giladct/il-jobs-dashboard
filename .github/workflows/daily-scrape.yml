name: Daily Jobs Scrape

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 09:00 Israel time
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore jobs.db from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ runner.os }}
          restore-keys: jobs-db-${{ runner.os }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python jobs_tracker.py

      - name: Save jobs.db to cache
        uses: actions/cache/save@v4
        with:
          path: jobs.db
          key: jobs-db-${{ runner.os }}-${{ github.run_id }}

      - name: Commit updated data.js (and remove seeded jobs.db if present)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Remove jobs.db from repo tracking if it was seeded
          if git ls-files --error-unmatch jobs.db 2>/dev/null; then
            git rm --cached jobs.db
            echo "*.db" >> .gitignore
            git add .gitignore
          fi
          git add data.js
          git diff --cached --quiet || git commit -m "Auto-update jobs data $(date -u +%Y-%m-%d)"
          git push
