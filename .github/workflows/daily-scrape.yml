name: Daily Jobs Scrape

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 09:00 Israel time
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python jobs_tracker.py

      - name: Enrich jobs from 2 days ago with LinkedIn posted-time/applicants
        run: python jobs_tracker.py linkedin-data

      - name: Commit updated data.js and jobs.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js jobs.db
          git diff --cached --quiet || git commit -m "Auto-update jobs data $(date -u +%Y-%m-%d)"
          git push
